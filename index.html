<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Calculator</title>
  </head>
  <body>
  <div class="container">
    
    <main class="calculator">
      <h1>Calculadora</h1>
      <section class="calculator-panel" aria-label="Calculadora simple">
        <output class="calculator-display">0</output>
        <div class="calculator-keypad"></div>
      </section>
    </main>

    <aside>
      <h2>Historial</h2>
      <ul class="history-list history-keypad">
      </ul>
      <output class="history-display"></output>
    </aside>

  </div>

  <script src="script.js"></script>
</body>
</html>
